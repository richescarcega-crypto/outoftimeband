<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060e1c">
<link rel="apple-touch-icon" href="icon.png">
<link rel="shortcut icon" href="icon.png">
<title>Out of Time</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#060e1c;color:#e8f0ff;font-family:"Exo 2",sans-serif;}
input,select,textarea{font-family:"Exo 2",sans-serif;outline:none;border:none;background:transparent;color:#e8f0ff;}
button{cursor:pointer;font-family:"Exo 2",sans-serif;}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}




#tabs{flex-shrink:0;display:flex;background:#080f1e;border-bottom:2px solid #1a3a8a;}
.tb{flex:1;padding:9px 2px 7px;background:none;border:none;color:#3a5a7a;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:"Russo One",sans-serif;font-size:8px;letter-spacing:.3px;-webkit-tap-highlight-color:rgba(245,197,24,.3);touch-action:manipulation;}
.tb .i{font-size:16px;pointer-events:none;}
.tb span{pointer-events:none;}
.tb.on{color:#f5c518;border-bottom:3px solid #f5c518;}
#cnt{flex:1;position:relative;overflow:hidden;}
.sc{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;visibility:hidden;background:#060e1c;}
.sc.on{visibility:visible;}
:root{--g:#f5c518;--b:#4a9eff;--n2:#0a1628;--n3:#0d1f3a;--n4:#101e34;}
.sh{font-family:"Russo One",sans-serif;font-size:10px;letter-spacing:3px;color:#fff;margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--n3);}
.card{background:var(--n4);border:1px solid var(--n3);border-radius:10px;padding:12px;margin-bottom:10px;}
.card-lbl{font-family:"Russo One",sans-serif;font-size:9px;letter-spacing:3px;color:#fff;margin-bottom:8px;}
.none{font-size:13px;color:#fff;font-style:italic;}
.hero{display:grid;grid-template-columns:1fr 1fr;height:185px;border-radius:12px;overflow:hidden;border:1px solid rgba(245,197,24,.2);margin-bottom:12px;}
.hero-l{background:linear-gradient(135deg,#0d2050,#0a1628);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;}
.hero-l img{width:90%;object-fit:contain;filter:drop-shadow(0 0 10px rgba(245,197,24,.4));}
.htag{font-family:"Russo One",sans-serif;font-size:7px;color:var(--g);letter-spacing:1.5px;text-align:center;margin-top:7px;line-height:1.8;}
.hero-r{overflow:hidden;}
.hero-r img{width:100%;height:185px;object-fit:cover;object-position:top;}
.gi{padding:8px 10px;background:var(--n2);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--g);}
.git{font-size:14px;font-weight:600;}
.gim{font-size:11px;color:var(--b);margin-top:2px;}
.gid{font-family:"Russo One",sans-serif;font-size:11px;color:var(--g);margin-top:3px;}
.ri{padding:8px 10px;background:var(--n2);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--b);}
.mr{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--n2);border-radius:6px;margin-bottom:3px;}
.mrav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#000;flex-shrink:0;}
.cnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;background:#f5c518;border-radius:10px;padding:8px 6px;}
.cnav button{background:none;border:none;color:#1a3a8a;font-size:28px;padding:0 8px;font-weight:700;}
.mlbl{font-family:"Russo One",sans-serif;font-size:16px;letter-spacing:2px;color:#1a3a8a;}
.legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;font-size:11px;color:#fff;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:rgba(26,58,138,.15);border:1px solid rgba(74,158,255,.2);border-radius:10px;padding:7px 4px;margin-bottom:12px;}
.dhdr{text-align:center;font-size:11px;font-weight:700;color:#fff;font-family:"Russo One",sans-serif;padding-bottom:3px;}
.dc{min-height:38px;background:rgba(10,22,40,.9);border-radius:5px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;}
.dc:active{background:rgba(245,197,24,.2);}
.dc.td{background:rgba(26,58,138,.5);outline:1px solid rgba(245,197,24,.5);}
.dn{font-size:11px;color:#fff;font-weight:500;}
.dc.td .dn{color:var(--g);font-weight:700;}
.pips{display:flex;gap:2px;margin-top:2px;}
.pip{width:4px;height:4px;border-radius:50%;}
.er{background:var(--n4);border-radius:8px;padding:9px 11px;margin-bottom:6px;display:flex;gap:8px;}
.ebdg{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;font-family:"Russo One",sans-serif;}
.slc{background:var(--n4);border:1px solid var(--n3);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;touch-action:manipulation;}
.sln{font-family:"Russo One",sans-serif;font-size:16px;color:#fff;}
.slm{font-size:11px;color:#fff;margin-top:2px;}
.sr{background:var(--n4);border-radius:8px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.sn{font-family:"Russo One",sans-serif;font-size:15px;color:var(--g);width:20px;text-align:center;flex-shrink:0;}
.st{font-size:13px;font-weight:600;color:#fff;}
.sd{font-size:11px;color:#fff;margin-top:2px;}
.sa{display:flex;gap:2px;flex-shrink:0;}
.ib{background:none;border:none;font-size:13px;padding:4px;color:#aaa;touch-action:manipulation;}
#sc-chat{padding:12px;}
#cmsgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:8px;}
.dsep{text-align:center;font-size:10px;color:#fff;padding:6px 0;font-family:"Russo One",sans-serif;}
.mrow{display:flex;align-items:flex-end;gap:6px;}
.mrow.me{flex-direction:row-reverse;}
.mb{max-width:72%;padding:8px 12px;}
.mb.me{border-radius:16px 16px 4px 16px;background:#1a3a8a;}
.mb.them{border-radius:16px 16px 16px 4px;background:var(--n3);}
.ms{font-size:10px;font-weight:700;margin-bottom:2px;}
.mt{font-size:13px;line-height:1.4;color:#fff;}
.mti{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;text-align:right;}
#cir{flex-shrink:0;display:flex;gap:8px;padding:8px 0 10px;border-top:1px solid var(--n3);}
#cin{flex:1;background:var(--n2);border:1px solid var(--b);border-radius:20px;padding:9px 14px;color:#e8f0ff;font-size:13px;}
#csb{background:#1a3a8a;border:none;border-radius:50%;width:40px;height:40px;color:var(--g);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mc{background:var(--n4);border:1px solid var(--n3);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.avmd{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;position:relative;flex-shrink:0;}
.fs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fc{background:var(--n4);border:1px solid var(--n3);border-radius:10px;padding:12px;}
.fcl{font-family:"Russo One",sans-serif;font-size:10px;color:#fff;letter-spacing:2px;margin-bottom:4px;}
.fca{font-family:"Russo One",sans-serif;font-size:24px;color:var(--g);}
.fcs{font-size:11px;color:#fff;margin-top:2px;}
.fr2{display:flex;gap:8px;}
.ab{background:var(--n4);border:1px dashed #1a3a8a;border-radius:8px;padding:11px;color:var(--b);font-family:"Russo One",sans-serif;font-size:11px;width:100%;margin-top:6px;display:block;text-align:center;touch-action:manipulation;}
.sb{background:var(--g);border:none;border-radius:8px;padding:10px 16px;color:#060e1c;font-weight:700;font-family:"Russo One",sans-serif;font-size:12px;}
.cb{background:var(--n2);border:none;border-radius:8px;padding:10px 14px;color:#aaa;font-weight:600;}
.fb{background:var(--n4);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;}
.fi2{background:#060e1c;border:1px solid var(--b);border-radius:6px;padding:8px 10px;color:#e8f0ff;font-size:12px;width:100%;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.mo{background:var(--n2);border-radius:18px 18px 0 0;padding:18px 14px 40px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border:1px solid var(--b);}
.moh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.mot{font-family:"Russo One",sans-serif;font-size:17px;letter-spacing:1px;color:#fff;}
.mi{background:#060e1c;border:1px solid var(--b);border-radius:8px;padding:9px 12px;color:#e8f0ff;font-size:13px;width:100%;margin-bottom:8px;}
.mdi{height:1px;background:var(--n3);margin:10px 0;}
.ms2{font-size:10px;color:#fff;letter-spacing:2px;font-family:"Russo One",sans-serif;margin-bottom:8px;}
.etr{display:flex;gap:6px;margin-bottom:10px;}
.etb{flex:1;background:transparent;border:1px solid var(--n3);border-radius:8px;padding:8px 4px;color:#aaa;font-size:11px;font-family:"Russo One",sans-serif;touch-action:manipulation;}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(245,197,24,.1)}50%{box-shadow:0 0 22px rgba(245,197,24,.3)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.gc{animation:glow 3s infinite;}
.pu{animation:pulse 2s infinite;}
</style>
</head>
<body>
<div id="app">

<div id="tabs">
  <button class="tb on" onclick="go('home',this)"><span class="i">&#127968;</span><span>Home</span></button>
  <button class="tb" onclick="go('cal',this)"><span class="i">&#128197;</span><span>Calendar</span></button>
  <button class="tb" onclick="go('sets',this)"><span class="i">&#127925;</span><span>Setlists</span></button>
  <button class="tb" onclick="go('chat',this)"><span class="i">&#128172;</span><span>Chat</span></button>
  <button class="tb" onclick="go('band',this)"><span class="i">&#128101;</span><span>Band</span></button>
  <button class="tb" onclick="go('songs',this)"><span class="i">&#127908;</span><span>Songs</span></button>
  <button class="tb" onclick="go('pay',this)"><span class="i">&#128176;</span><span>Pay</span></button>
</div>
<div id="cnt">

<div id="sc-home" class="sc on">
  <div class="hero">
    <div class="hero-l"><img src="logo.jpg" alt="OOT"><div class="htag">Danceable Classic Rock<br>Pure Energy</div></div>
    <div class="hero-r"><img src="band.jpg" alt="Band"></div>
  </div>
  <div class="card gc"><div class="card-lbl">UPCOMING GIGS</div><div id="hg"></div></div>
  <div class="card"><div class="card-lbl">UPCOMING REHEARSALS</div><div id="hr"></div></div>
  <div class="sh">MEMBERS</div><div id="hm"></div>
</div>

<div id="sc-cal" class="sc">
  <div class="cnav"><button onclick="pMo()">&#8249;</button><span class="mlbl" id="mlbl"></span><button onclick="nMo()">&#8250;</button></div>
  <div class="legend">
    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#f5c518;margin-right:4px;vertical-align:middle;"></span>Gig</span>
    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#4a9eff;margin-right:4px;vertical-align:middle;"></span>Rehearsal</span>
    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#ff4757;margin-right:4px;vertical-align:middle;"></span>Blackout</span>
  </div>
  <div class="cgrid" id="cgrid"></div>
  <div class="sh">ALL EVENTS</div>
  <div id="evl"></div>
</div>

<div id="sc-sets" class="sc">
  <div id="si">
    <div class="sh">SETLISTS</div>
    <div id="sll"></div>
    <button class="ab" onclick="nwSL()">+ New Setlist</button>
  </div>
  <div id="se" style="display:none">
    <button style="background:none;border:none;color:#4a9eff;font-size:13px;margin-bottom:8px;cursor:pointer;" onclick="clEd()">&#8592; Back to Setlists</button>
    <div id="eh"></div>
    <div id="ssl"></div>
    <button class="ab" onclick="showPicker()">+ Add Songs from Library</button>
  </div>
  <div id="song-picker" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;flex-direction:column;padding:16px;max-width:480px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-family:'Russo One',sans-serif;font-size:16px;color:#f5c518;">Pick Songs</span>
      <button style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;" onclick="hidePicker()">&#10005;</button>
    </div>
    <input id="picker-search" class="fi2" placeholder="Search songs..." oninput="rPicker()" style="margin-bottom:10px;">
    <div id="picker-list" style="flex:1;overflow-y:auto;"></div>
    <button class="sb" onclick="addPickedSongs()" style="margin-top:12px;width:100%;">Add Selected Songs</button>
  </div>
</div>

<div id="sc-chat" class="sc">
  <div style="margin-bottom:8px;">
    <div style="font-family:'Russo One',sans-serif;font-size:9px;letter-spacing:2px;color:#fff;margin-bottom:6px;">MESSAGE TO:</div>
    <div id="chat-to-row" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div id="cir" style="margin-bottom:8px;display:flex;gap:8px;padding:0 0 8px;border-bottom:1px solid #0d1f3a;">
    <input id="cin" placeholder="Message..." onkeydown="if(event.key==='Enter')sMsg()">
    <button id="csb" onclick="sMsg()">&#10148;</button>
  </div>
  <div id="cmsgs"></div>
</div>

<div id="sc-band" class="sc">
  <div class="sh">OUT OF TIME - BAND ROSTER</div>
  <div id="ml"></div>
  <button class="ab" onclick="opM('mm')">+ Add Member</button>
</div>

<div id="sc-songs" class="sc">
  <div class="sh">SONG LIBRARY</div>
  <input id="song-search" class="fi2" placeholder="Search songs..." oninput="rLib()" style="width:100%;margin-bottom:10px;">
  <div id="library-list"></div>
  <div id="add-song-form" style="display:none" class="fb">
    <input class="fi2" id="lib-title" placeholder="Song title *">
    <div class="fr2"><input class="fi2" id="lib-artist" placeholder="Artist" style="flex:2"><input class="fi2" id="lib-key" placeholder="Key" style="width:60px;flex:none"></div>
    <div class="fr2"><button class="sb" onclick="adLibSong()">Add Song</button><button class="cb" onclick="document.getElementById('add-song-form').style.display='none'">Cancel</button></div>
  </div>
  <button class="ab" onclick="document.getElementById('add-song-form').style.display='flex';document.getElementById('add-song-form').style.flexDirection='column'">+ Add Song to Library</button>
</div>

<div id="sc-pay" class="sc">
  <div class="fs">
    <div class="fc"><div class="fcl">BAND TOTAL</div><div class="fca" id="bt">$0</div><div class="fcs">all gigs</div></div>
    <div class="fc"><div class="fcl">YOUR CUT</div><div class="fca" id="mc2">$0</div><div class="fcs" id="cs"></div></div>
  </div>
  <div class="sh">GIG PAYOUTS</div><div id="pl"></div>
  <div id="pf" style="display:none" class="fb">
    <input class="fi2" id="pv" placeholder="Venue *">
    <input class="fi2" id="pg" placeholder="Gross pay ($) *" type="number">
    <input class="fi2" id="pe" placeholder="Expenses ($)" type="number">
    <div class="fr2"><button class="sb" onclick="adPay()">Add</button><button class="cb" onclick="document.getElementById('pf').style.display='none'">Cancel</button></div>
  </div>
  <button class="ab" onclick="document.getElementById('pf').style.display='flex';document.getElementById('pf').style.flexDirection='column'">+ Log Gig Pay</button>
</div>

</div></div>

<div class="ov" id="evm">
  <div class="mo">
    <div class="moh"><span class="mot" id="emtit">Add Event</span><button style="background:none;border:none;color:#aaa;font-size:15px;cursor:pointer;" onclick="clM('evm')">&#10005;</button></div>
    <div id="eex"></div><div class="mdi"></div>
    <div class="ms2">ADD NEW EVENT</div>
    <div class="etr">
      <button class="etb" id="et-gig" onclick="sET('gig')">Gig</button>
      <button class="etb" id="et-rehearsal" onclick="sET('rehearsal')">Rehearsal</button>
      <button class="etb" id="et-blackout" onclick="sET('blackout')">Blackout</button>
    </div>
    <input class="mi" id="etit" placeholder="Title *">
    <input class="mi" id="enot" placeholder="Notes (time, address)">
    <button class="sb" onclick="adEv()" style="width:100%">Add to Calendar</button>
  </div>
</div>

<div class="ov" id="mm">
  <div class="mo">
    <div class="moh"><span class="mot">Add Member</span><button style="background:none;border:none;color:#aaa;font-size:15px;cursor:pointer;" onclick="clM('mm')">&#10005;</button></div>
    <input class="mi" id="mnam" placeholder="Name *">
    <input class="mi" id="mrol" placeholder="Role (Guitar, Keys, Manager)">
    <button class="sb" onclick="adMem()" style="width:100%">Add to Band</button>
  </div>
</div>

<script>
"use strict";
function go(id,btn){
  document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  var sc=document.getElementById('sc-'+id);
  if(sc)sc.classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='home')rHome();
  else if(id==='cal')rCal();
  else if(id==='sets')rSets();
  else if(id==='chat'){rChatTo();rChat();}
  else if(id==='band')rBand();
  else if(id==='songs')rLib();
  else if(id==='pay')rPay();
}

var INST=["Vocals","Lead Guitar","Rhythm Guitar","Bass Guitar","Drums","Keyboards","Keys / Vocals","Acoustic Guitar","Percussion","Trumpet","Saxophone","Manager","Other"];
var members=[
  {id:1,name:"Jim",   inst:"Lead Guitar", av:"JM",color:"#4a9eff",ph:"",em:"",addr:""},
  {id:2,name:"Amy",   inst:"Bass Guitar", av:"AM",color:"#06d6a0",ph:"",em:"",addr:""},
  {id:3,name:"Rich",  inst:"Drums",       av:"RI",color:"#ff6b6b",ph:"",em:"",addr:""},
  {id:4,name:"Ed",    inst:"Lead Guitar", av:"ED",color:"#f5c518",ph:"",em:"",addr:""},
  {id:5,name:"Rachel",inst:"Vocals",      av:"RC",color:"#ff9ef5",ph:"",em:"",addr:""},
  {id:6,name:"Zach",  inst:"Keyboards",   av:"ZK",color:"#c084fc",ph:"",em:"",addr:""},
];
var events=[];
var msgs=[];
var sets=[];
var pay=[];
var CY=2026,CM=3,sDay=null,cET="gig",aSL=null,eSID=null;
var MO=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var EC={gig:"#f5c518",blackout:"#ff4757",rehearsal:"#4a9eff"};
var ME=3;
var chatTo="band";

function dU(d){return Math.ceil((new Date(d+"T00:00:00")-new Date())/86400000);}
function gM(id){return members.find(function(m){return m.id==id;})||{name:"?",av:"?",color:"#555"};}
function fD(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function tD(ss){var x=ss.reduce(function(a,s){var p=(s.d||"0:00").split(":");return a+parseInt(p[0])*60+(parseInt(p[1])||0);},0);return Math.floor(x/60)+"m "+x%60+"s";}

function rHome(){
  var gg=events.filter(function(e){return e.type==='gig'&&dU(e.date)>=0;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,3);
  document.getElementById('hg').innerHTML=gg.length?gg.map(function(e){var d=dU(e.date);return '<div class="gi"><div class="git">'+e.title+'</div><div class="gim">'+e.date+' - '+e.note+'</div><div class="gid">'+(d===0?'TONIGHT':d===1?'TOMORROW':d+' DAYS AWAY')+'</div></div>';}).join(''):'<div class="none">NONE</div>';
  var rr=events.filter(function(e){return e.type==='rehearsal'&&dU(e.date)>=0;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,3);
  document.getElementById('hr').innerHTML=rr.length?rr.map(function(e){var d=dU(e.date);return '<div class="ri"><div class="git">'+e.title+'</div><div class="gim" style="color:#aaa">'+e.date+' - '+e.note+'</div></div>';}).join(''):'<div class="none">NONE</div>';
  document.getElementById('hm').innerHTML=members.map(function(m){return '<div class="mr"><div class="mrav" style="background:'+m.color+'">'+m.av+'</div><span style="flex:1;font-size:12px;font-weight:600;color:#e8f0ff;">'+m.name+'</span><span style="font-size:11px;color:#4a9eff;">'+m.inst+'</span></div>';}).join('');
}

function rCal(){
  document.getElementById('mlbl').textContent=MO[CM].toUpperCase()+' '+CY;

function fmtPhone(inp){
  var v=inp.value.replace(/\D/g,'').slice(0,10);
  if(v.length>=6) v='('+v.slice(0,3)+') '+v.slice(3,6)+'-'+v.slice(6);
  else if(v.length>=3) v='('+v.slice(0,3)+') '+v.slice(3);
  inp.value=v;
}

function rPicker(){

  var songs=library.filter(function(s){return !q||s.title.toLowerCase().includes(q)||(s.artist||'').toLowerCase().includes(q);});
  songs.sort(function(a,b){return a.title.localeCompare(b.title);});
  var sl=sets.find(function(x){return x.id===aSL;});
  var inSet=sl?sl.songs.map(function(s){return s.libId;}):[];
  document.getElementById('picker-list').innerHTML=songs.map(function(s){
    var picked=pickedSongs[s.id];
    var already=inSet.indexOf(s.id)>=0;
    return '<div onclick="togglePick('+s.id+')" style="display:flex;align-items:center;padding:8px;border-bottom:1px solid #0d1f3a;cursor:pointer;background:'+(picked?'rgba(245,197,24,.15)':'transparent')+';">'+
      '<div style="width:20px;height:20px;border-radius:4px;border:2px solid '+(picked?'#f5c518':'#1a3a8a')+';background:'+(picked?'#f5c518':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:10px;font-size:12px;color:#000;">'+(picked?'&#10003;':'')+' </div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="font-size:13px;font-weight:600;color:'+(already?'#555':'#e8f0ff')+';">'+s.title+(already?' (already in set)':'')+'</div>'+
        (s.artist?'<div style="font-size:11px;color:#f5c518;">'+s.artist+'</div>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

function togglePick(id){
  if(pickedSongs[id])delete pickedSongs[id];
  else pickedSongs[id]=true;
  rPicker();
}

function addPickedSongs(){
  var sl=sets.find(function(x){return x.id===aSL;});
  if(!sl)return;
  var ids=Object.keys(pickedSongs).map(Number);
  ids.forEach(function(id){
    var libSong=library.find(function(s){return s.id===id;});
    if(libSong){
      sl.songs.push({id:Date.now()+Math.random(),t:libSong.title,d:'',k:libSong.key||'',n:'',libId:libSong.id});
    }
  });
  hidePicker();
  rEd();
}

function renSL(){
  var sl=sets.find(function(x){return x.id===aSL;});
  if(!sl)return;
  var name=prompt('Rename setlist:',sl.name);
  if(name)sl.name=name;
  rEd();
}

function opM(id){document.getElementById(id).classList.add('on');}
function clM(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.ov').forEach(function(o){o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});});

rHome();
</script>
</body>
</html>
